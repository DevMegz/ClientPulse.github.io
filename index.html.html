    // ── Build email content from record ──
    function buildEmailContent(record) {
      const severityEmoji = { Critical: "🔴", High: "🟠", Medium: "🟡", Low: "🟢" };
      const subject = `[ClientPulse] New ${record.category} — ${record.projectName} (${record.severityLevel})`;
      const message = [
        `Dear Team,`,
        ``,
        `A new ${record.category} has been logged in ClientPulse and requires your attention.`,
        ``,
        `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`,
        ` ${severityEmoji[record.severityLevel] || "📋"}  RECORD ID : ${record.id}`,
        `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`,
        ``,
        `  Project        : ${record.projectName}`,
        `  Service Line   : ${record.serviceLine || "—"}`,
        `  BU Name        : ${record.buName || "—"}`,
        `  Client         : ${record.clientName || "—"}`,
        `  Date Received  : ${record.dateReceived || record.entryDate}`,
        `  Reported By    : ${record.reportedBy}`,
        `  Via            : ${record.communicationMode || "—"}`,
        ``,
        `  Category       : ${record.category}`,
        `  Severity       : ${record.severityLevel}`,
        `  Type           : ${record.type || "—"}`,
        `  Impact Type    : ${record.impactType || "—"}`,
        ``,
        `  Description    :`,
        `  ${record.detailedDescription || "—"}`,
        ``,
        `  Responsible Team   : ${record.responsibleTeam || "TBD"}`,
        `  Responsible Person : ${record.responsibleIndividual || "TBD"}`,
        `  TAT for Closure    : ${record.tatForClosure ? record.tatForClosure + " days" : "TBD"}`,
        ``,
        `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`,
        `Please log in to ClientPulse to view full details and take action.`,
        ``,
        `— ClientPulse Automated Notification`,
      ].join("\n");
      return { subject, message };
    }

    // ── Send emails via EmailJS to all notifiable users ──
    async function sendEmailJSNotifications(record, allUsers) {
      const isConfigured = EMAILJS_CONFIG.SERVICE_ID !== "YOUR_SERVICE_ID";
      const { subject, message } = buildEmailContent(record);
      const recipients = allUsers
        .filter(u => NOTIFY_ROLES.includes(u.role))
        .map(u => ({ name: u.name, email: USER_EMAILS[u.name] || `${u.name.toLowerCase().replace(" ",".")}@company.com`, role: u.role }));

      const results = [];

      if (isConfigured) {
        // Initialize EmailJS
        emailjs.init(EMAILJS_CONFIG.PUBLIC_KEY);
        // Send one email per recipient
        for (const recipient of recipients) {
          try {
            await emailjs.send(EMAILJS_CONFIG.SERVICE_ID, EMAILJS_CONFIG.TEMPLATE_ID, {
              to_name:    recipient.name,
              to_email:   recipient.email,
              subject:    subject,
              message:    message,
              record_id:  record.id,
              project:    record.projectName,
              client:     record.clientName,
              severity:   record.severityLevel,
              category:   record.category,
              reported_by: record.reportedBy,
              sent_at:    new Date().toLocaleString(),
            });
            results.push({ ...recipient, status: "sent" });
          } catch (err) {
            results.push({ ...recipient, status: "failed", error: err.text || err.message });
          }
        }
      } else {
        // Demo mode — simulate sending
        await new Promise(r => setTimeout(r, 800));
        recipients.forEach(r => results.push({ ...r, status: "demo" }));
      }

      return { results, subject, message, sentAt: new Date().toLocaleString(), recordId: record.id, isConfigured };
    }

                          style={{ padding: "9px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0", fontSize: 13, outline: "none" }} />
                      </div>
                      {/* Last Name */}
                      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                        <label style={{ fontSize: 11, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.06em" }}>Last Name <span style={{ color: "#dc2626" }}>*</span></label>
                        <input placeholder="e.g. Sharma" value={newUser.lastName} onChange={e => setNewUser(p => ({ ...p, lastName: e.target.value }))}
                          style={{ padding: "9px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0", fontSize: 13, outline: "none" }} />
                      </div>
                      {/* Email */}
                      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                        <label style={{ fontSize: 11, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.06em" }}>Email Address <span style={{ color: "#dc2626" }}>*</span></label>
                        <input type="email" placeholder="e.g. priya@company.com" value={newUser.email} onChange={e => setNewUser(p => ({ ...p, email: e.target.value }))}
                          style={{ padding: "9px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0", fontSize: 13, outline: "none" }} />
                      </div>
                      {/* Designation */}
                      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                        <label style={{ fontSize: 11, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.06em" }}>Designation</label>
                        <input placeholder="e.g. Senior Analyst" value={newUser.designation} onChange={e => setNewUser(p => ({ ...p, designation: e.target.value }))}
                          style={{ padding: "9px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0", fontSize: 13, outline: "none" }} />
                      </div>
                      {/* Team */}
                      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                        <label style={{ fontSize: 11, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.06em" }}>Team</label>
                        <input placeholder="e.g. Platform Engineering" value={newUser.team} onChange={e => setNewUser(p => ({ ...p, team: e.target.value }))}
                          style={{ padding: "9px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0", fontSize: 13, outline: "none" }} />
                      </div>
                      {/* Role */}
                      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                        <label style={{ fontSize: 11, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.06em" }}>Role <span style={{ color: "#dc2626" }}>*</span></label>
                        <select value={newUser.role} onChange={e => setNewUser(p => ({ ...p, role: e.target.value }))}
                          style={{ padding: "9px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0", fontSize: 13, background: "#fff", cursor: "pointer" }}>
                          {ROLE_OPTIONS.map(r => <option key={r} value={r}>{r}</option>)}
                        </select>
                      </div>
                    </div>

                    <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", borderTop: "1px solid #f1f5f9", paddingTop: 16 }}>
                      <button onClick={() => { setShowAddForm(false); setNewUser(EMPTY_NEW_USER); setFormError(""); }}
                        style={{ padding: "9px 18px", borderRadius: 8, border: "none", background: "#f1f5f9", color: "#475569", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
                        Cancel
                      </button>
                      <button onClick={addUser}
                        style={{ padding: "9px 24px", borderRadius: 8, border: "none", background: "#4f46e5", color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
                        ✓ Add User
                      </button>
                    </div>
                  </div>
                )}
              </div>

              {/* User Cards */}
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {users.map(u => {
                  const allChecked = u.fields === "all" || u.fields.length === ALL_FIELDS.length;
                  return (
                    <div key={u.id} style={{ background: "#fff", borderRadius: 12, border: "1px solid #e2e8f0", overflow: "hidden" }}>
                      {/* User Header */}
                      <div style={{ display: "flex", alignItems: "flex-start", gap: 14, padding: "16px 20px" }}>

                        {/* Avatar */}
                        <div style={{ width: 44, height: 44, borderRadius: "50%", background: avatarColor(u.name), color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, fontWeight: 700, flexShrink: 0, marginTop: 2 }}>
                          {u.avatar}
                        </div>

                        {/* User Info Block */}
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap", marginBottom: 6 }}>
                            <div style={{ fontWeight: 800, fontSize: 15, color: "#1e293b" }}>{u.firstName} {u.lastName}</div>
                            <select value={u.role} onChange={e => updateRole(u.id, e.target.value)}
                              style={{ fontSize: 11, color: "#6366f1", fontWeight: 700, border: "1px solid #e0e7ff", borderRadius: 6, padding: "2px 10px", background: "#eef2ff", cursor: "pointer", outline: "none" }}>
                              {ROLE_OPTIONS.map(r => <option key={r} value={r}>{r}</option>)}
                            </select>
                          </div>

                          {/* Detail Pills Row */}
                          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>
                            {u.email && (
                              <span style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 12, color: "#475569", background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 6, padding: "3px 10px" }}>
                                ✉ {u.email}
                              </span>
                            )}
                            {u.designation && (
                              <span style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 12, color: "#475569", background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 6, padding: "3px 10px" }}>
                                🏷 {u.designation}
                              </span>
                            )}
                            {u.team && (
                              <span style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 12, color: "#475569", background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 6, padding: "3px 10px" }}>
                                👥 {u.team}
                              </span>
                            )}
                          </div>

                          {/* Action Permission Checkboxes */}
                          <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
                            {ACTION_KEYS.map(key => (
                              <label key={key} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12, cursor: "pointer", userSelect: "none" }}>
                                <input type="checkbox" checked={!!u.actions[key]} onChange={() => toggleAction(u.id, key)}
                                  style={{ width: 14, height: 14, cursor: "pointer", accentColor: "#4f46e5" }} />
                                <span style={{ color: u.actions[key] ? "#1e293b" : "#94a3b8", fontWeight: 600 }}>{ACTION_LABELS[key]}</span>
                              </label>
                            ))}
                          </div>
                        </div>

                        {/* Expand & Remove Buttons */}
                        <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                          <button onClick={() => toggleSection(u.id, "projects")}
                            style={{ padding: "6px 12px", borderRadius: 7, border: "1px solid #e2e8f0", background: expandedSection[u.id] === "projects" ? "#eef2ff" : "#f8fafc", color: "#6366f1", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>
                            {expandedSection[u.id] === "projects" ? "▲" : "▼"} Projects
                          </button>
                          <button onClick={() => toggleSection(u.id, "fields")}
                            style={{ padding: "6px 12px", borderRadius: 7, border: "1px solid #e2e8f0", background: expandedSection[u.id] === "fields" ? "#eef2ff" : "#f8fafc", color: "#6366f1", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>
                            {expandedSection[u.id] === "fields" ? "▲" : "▼"} Fields
                          </button>
                          <button onClick={() => removeUser(u.id)}
                            style={{ padding: "6px 12px", borderRadius: 7, border: "1px solid #fee2e2", background: "#fef2f2", color: "#dc2626", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>
                            ✕
                          </button>
                        </div>
                      </div>

                      {/* Expanded — Project Access */}
                      {expandedSection[u.id] === "projects" && (
                        <div style={{ borderTop: "1px solid #f1f5f9", padding: "16px 20px", background: "#fafafa" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                            <div style={{ fontSize: 12, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.06em" }}>Project Access</div>
                            {u.role === "Admin" ? (
                              <span style={{ fontSize: 11, fontWeight: 700, background: "#eef2ff", color: "#4f46e5", padding: "3px 10px", borderRadius: 999 }}>Admin — Full Access to All Projects</span>
                            ) : (
                              <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, cursor: "pointer", fontWeight: 700, color: "#4f46e5" }}>
                                <input type="checkbox"
                                  checked={(u.projectAccess || []).length === PROJECTS.length}
                                  onChange={() => toggleAllProjects(u.id)}
                                  style={{ width: 15, height: 15, cursor: "pointer", accentColor: "#4f46e5" }} />
                                Select All
                              </label>
                            )}
                          </div>
                          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: "8px 12px" }}>
                            {PROJECTS.map(proj => {
                              const hasAccess = hasProjectAccess(u, proj.id);
                              return (
                                <label key={proj.id} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, cursor: u.role === "Admin" ? "default" : "pointer", userSelect: "none",
                                  background: hasAccess ? proj.color + "10" : "#f8fafc",
                                  border: `1px solid ${hasAccess ? proj.color + "40" : "#e2e8f0"}`,
                                  borderRadius: 8, padding: "7px 10px" }}>
                                  <input type="checkbox" checked={hasAccess}
                                    disabled={u.role === "Admin"}
                                    onChange={() => toggleProject(u.id, proj.id)}
                                    style={{ width: 14, height: 14, cursor: u.role === "Admin" ? "default" : "pointer", accentColor: proj.color, flexShrink: 0 }} />
                                  <span style={{ color: hasAccess ? proj.color : "#64748b", fontWeight: 700, fontSize: 14, lineHeight: 1, flexShrink: 0 }}>{proj.icon}</span>
                                  <span style={{ color: hasAccess ? "#1e293b" : "#94a3b8", fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{proj.name}</span>
                                </label>
                              );
                            })}
                          </div>
                        </div>
                      )}

                      {/* Expanded Field Permissions */}
                      {expandedSection[u.id] === "fields" && (
                        <div style={{ borderTop: "1px solid #f1f5f9", padding: "16px 20px", background: "#fafafa" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                            <div style={{ fontSize: 12, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.06em" }}>Field-Level Edit Access</div>
                            <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, cursor: "pointer", fontWeight: 700, color: "#4f46e5" }}>
                              <input type="checkbox" checked={allChecked} onChange={() => toggleAllFields(u.id)}
                                style={{ width: 15, height: 15, cursor: "pointer", accentColor: "#4f46e5" }} />
                              Select All
                            </label>
                          </div>
                          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: "8px 16px" }}>
                            {ALL_FIELDS.map(([label, key]) => (
                              <label key={key} style={{ display: "flex", alignItems: "center", gap: 7, fontSize: 13, cursor: "pointer", userSelect: "none" }}>
                                <input type="checkbox" checked={hasField(u, key)} onChange={() => toggleField(u.id, key)}
                                  style={{ width: 15, height: 15, cursor: "pointer", accentColor: "#4f46e5" }} />
                                <span style={{ color: hasField(u, key) ? "#1e293b" : "#94a3b8" }}>{label}</span>
                              </label>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {activeTab === "matrix" && (
            <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #e2e8f0", overflow: "hidden" }}>
              <div style={{ padding: "16px 20px", borderBottom: "1px solid #f1f5f9" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#1e293b" }}>Permission Matrix — All Users</div>
                <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>Live view of every user's actions, project & field access. Edit in the Users tab.</div>
              </div>
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                  <thead>
                    <tr style={{ background: "#f8fafc" }}>
                      <th style={{ ...th, minWidth: 180 }}>Permission</th>
                      {users.map(u => (
                        <th key={u.id} style={{ ...th, textAlign: "center", minWidth: 110 }}>
                          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                            <div style={{ width: 28, height: 28, borderRadius: "50%", background: avatarColor(u.name), color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700 }}>{u.avatar}</div>
                            <div style={{ fontSize: 11, fontWeight: 700, color: "#1e293b" }}>{u.name.split(" ")[0]}</div>
                            <div style={{ fontSize: 10, color: "#6366f1" }}>{u.role}</div>
                          </div>
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {/* ── Actions section ── */}
                    <tr style={{ background: "#eef2ff" }}>
                      <td style={{ ...td, fontWeight: 700, fontSize: 11, color: "#6366f1", textTransform: "uppercase", letterSpacing: "0.05em" }}>Actions</td>
                      {users.map(u => <td key={u.id} style={td}></td>)}
                    </tr>
                    {ACTION_KEYS.map((key, i) => (
                      <tr key={key} style={{ background: i % 2 === 0 ? "#fff" : "#f8fafc" }}>
                        <td style={{ ...td, paddingLeft: 24, fontWeight: 600, color: "#475569" }}>{ACTION_LABELS[key]}</td>
                        {users.map(u => (
                          <td key={u.id} style={{ ...td, textAlign: "center" }}>
                            <input type="checkbox" checked={!!u.actions[key]} onChange={() => toggleAction(u.id, key)}
                              style={{ width: 15, height: 15, cursor: "pointer", accentColor: "#4f46e5" }} />
                          </td>
                        ))}
                      </tr>
                    ))}
                    {/* ── Project Access section ── */}
                    <tr style={{ background: "#eef2ff" }}>
                      <td style={{ ...td, fontWeight: 700, fontSize: 11, color: "#6366f1", textTransform: "uppercase", letterSpacing: "0.05em" }}>Project Access</td>
                      {users.map(u => <td key={u.id} style={td}></td>)}
                    </tr>
                    {PROJECTS.map((proj, i) => (
                      <tr key={proj.id} style={{ background: i % 2 === 0 ? "#fff" : "#f8fafc" }}>
                        <td style={{ ...td, paddingLeft: 24 }}>
                          <span style={{ display: "flex", alignItems: "center", gap: 7 }}>
                            <span style={{ color: proj.color, fontWeight: 900, fontSize: 14 }}>{proj.icon}</span>
                            <span style={{ fontWeight: 600, color: "#475569" }}>{proj.name}</span>
                          </span>
                        </td>
                        {users.map(u => (
                          <td key={u.id} style={{ ...td, textAlign: "center" }}>
                            <input type="checkbox" checked={hasProjectAccess(u, proj.id)}
                              disabled={u.role === "Admin"}
                              onChange={() => toggleProject(u.id, proj.id)}
                              style={{ width: 15, height: 15, cursor: u.role === "Admin" ? "default" : "pointer", accentColor: proj.color }} />
                          </td>
                        ))}
                      </tr>
                    ))}
                    {/* ── Field Access section ── */}
                    <tr style={{ background: "#eef2ff" }}>
                      <td style={{ ...td, fontWeight: 700, fontSize: 11, color: "#6366f1", textTransform: "uppercase", letterSpacing: "0.05em" }}>Field Access</td>
                      {users.map(u => <td key={u.id} style={td}></td>)}
                    </tr>
                    {ALL_FIELDS.map(([label, key], i) => (
                      <tr key={key} style={{ background: i % 2 === 0 ? "#fff" : "#f8fafc" }}>
                        <td style={{ ...td, paddingLeft: 24 }}>{label}</td>
                        {users.map(u => (
                          <td key={u.id} style={{ ...td, textAlign: "center" }}>
                            <input type="checkbox" checked={hasField(u, key)} onChange={() => toggleField(u.id, key)}
                              style={{ width: 15, height: 15, cursor: "pointer", accentColor: "#4f46e5" }} />
                          </td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      );
    }

    function EmailModal({ notification, onClose, sending }) {
      const [tab, setTab] = useState("recipients");
      if (!notification && !sending) return null;

      if (sending) return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(15,23,42,0.6)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div style={{ background: "#fff", borderRadius: 16, padding: 40, textAlign: "center", boxShadow: "0 25px 50px rgba(0,0,0,0.25)" }}>
            <div style={{ fontSize: 40, marginBottom: 16 }}>📧</div>
            <div style={{ fontSize: 16, fontWeight: 700, color: "#0f172a", marginBottom: 8 }}>Sending Notifications…</div>
            <div style={{ fontSize: 13, color: "#64748b" }}>Emailing all users via EmailJS</div>
            <div style={{ marginTop: 20, display: "flex", gap: 6, justifyContent: "center" }}>
              {[0,1,2].map(i => <div key={i} style={{ width: 8, height: 8, borderRadius: "50%", background: "#4f46e5", opacity: 0.3 + i * 0.35 }} />)}
            </div>
          </div>
        </div>
      );

      const { results, subject, message, sentAt, recordId, isConfigured } = notification;
      const sentCount = results.filter(r => r.status === "sent" || r.status === "demo").length;
      const failedCount = results.filter(r => r.status === "failed").length;

      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(15,23,42,0.6)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
          <div style={{ background: "#fff", borderRadius: 16, width: "100%", maxWidth: 640, maxHeight: "90vh", display: "flex", flexDirection: "column", boxShadow: "0 25px 50px rgba(0,0,0,0.25)" }}>

            {/* Header */}
            <div style={{ padding: "20px 24px 16px", borderBottom: "1px solid #e2e8f0", display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ width: 44, height: 44, borderRadius: "50%", background: failedCount > 0 ? "#fef2f2" : "#f0fdf4", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>
                {failedCount > 0 ? "⚠️" : "✅"}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 800, fontSize: 15, color: "#0f172a" }}>
                  {isConfigured
                    ? failedCount > 0 ? `${sentCount} sent, ${failedCount} failed` : `${sentCount} emails sent successfully!`
                    : `Demo mode — ${sentCount} users would be notified`}
                </div>
                <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>Record {recordId} · {sentAt}</div>
              </div>
              <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: "#94a3b8" }}>✕</button>
            </div>

            {/* Demo mode banner */}
            {!isConfigured && (
              <div style={{ background: "#fffbeb", borderBottom: "1px solid #fde68a", padding: "10px 24px", display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 16 }}>⚙️</span>
                <div style={{ fontSize: 12, color: "#92400e" }}>
                  <strong>Demo Mode</strong> — emails not sent yet. Open the HTML file, find <code style={{ background: "#fef3c7", padding: "1px 4px", borderRadius: 3 }}>EMAILJS_CONFIG</code> at the top and add your credentials to send real emails.
                  <a href="https://www.emailjs.com" target="_blank" style={{ color: "#d97706", marginLeft: 6, fontWeight: 700 }}>Get free account →</a>
                </div>
              </div>
            )}

            {/* Tabs */}
            <div style={{ display: "flex", borderBottom: "1px solid #e2e8f0", padding: "0 24px" }}>
              {[["recipients", `👥 Recipients (${results.length})`], ["preview", "📄 Email Preview"]].map(([key, label]) => (
                <button key={key} onClick={() => setTab(key)} style={{
                  padding: "10px 16px", border: "none", background: "none", cursor: "pointer",
                  fontSize: 13, fontWeight: 600,
                  color: tab === key ? "#4f46e5" : "#94a3b8",
                  borderBottom: tab === key ? "2px solid #4f46e5" : "2px solid transparent",
                  marginBottom: -1,
                }}>{label}</button>
              ))}
            </div>

            {/* Content */}
            <div style={{ flex: 1, overflowY: "auto", padding: 24 }}>
              {tab === "recipients" && (
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {results.map((r, i) => {
                    const statusColor = r.status === "sent" ? "#15803d" : r.status === "demo" ? "#2563eb" : "#dc2626";
                    const statusBg = r.status === "sent" ? "#f0fdf4" : r.status === "demo" ? "#eff6ff" : "#fef2f2";
                    const statusIcon = r.status === "sent" ? "✅" : r.status === "demo" ? "📬" : "❌";
                    const statusLabel = r.status === "sent" ? "Sent" : r.status === "demo" ? "Demo" : "Failed";
                    return (
                      <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 16px", background: "#f8fafc", borderRadius: 10, border: "1px solid #e2e8f0" }}>
                        <div style={{ width: 38, height: 38, borderRadius: "50%", background: "#4f46e5", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, flexShrink: 0 }}>
                          {r.name.split(" ").map(n => n[0]).join("")}
                        </div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontSize: 13, fontWeight: 700, color: "#1e293b" }}>{r.name}</div>
                          <div style={{ fontSize: 12, color: "#6366f1" }}>{r.email}</div>
                          {r.error && <div style={{ fontSize: 11, color: "#dc2626", marginTop: 2 }}>Error: {r.error}</div>}
                        </div>
                        <span style={{ fontSize: 11, fontWeight: 700, background: "#eef2ff", color: "#4f46e5", padding: "3px 10px", borderRadius: 999 }}>{r.role}</span>
                        <div style={{ display: "flex", alignItems: "center", gap: 5, background: statusBg, color: statusColor, padding: "4px 10px", borderRadius: 999, fontSize: 11, fontWeight: 700, flexShrink: 0 }}>
                          <span>{statusIcon}</span> {statusLabel}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
              {tab === "preview" && (
                <div>
                  <div style={{ background: "#f8fafc", borderRadius: 8, padding: "10px 14px", marginBottom: 14, border: "1px solid #e2e8f0" }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>Subject</div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: "#1e293b" }}>{subject}</div>
                  </div>
                  <div style={{ background: "#f8fafc", borderRadius: 8, padding: "14px", border: "1px solid #e2e8f0" }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 10 }}>Body</div>
                    <pre style={{ fontSize: 12, color: "#334155", whiteSpace: "pre-wrap", fontFamily: "monospace", lineHeight: 1.7 }}>{message}</pre>
                  </div>
                </div>
              )}
            </div>

            {/* Footer */}
            <div style={{ padding: "14px 24px", borderTop: "1px solid #e2e8f0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ fontSize: 12, color: "#94a3b8" }}>
                {isConfigured ? "💡 Powered by EmailJS" : "💡 Add your EmailJS credentials to send real emails"}
              </div>
              <button onClick={onClose} style={{ padding: "8px 24px", borderRadius: 8, border: "none", background: "#4f46e5", color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
                Done ✓
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ── Shared style constants ──
    const inputBase = { width: "100%", padding: "8px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0", fontSize: 13, background: "#fff", color: "#1e293b", outline: "none", boxSizing: "border-box" };
    const fieldStyle = { display: "flex", flexDirection: "column", gap: 4 };
    const labelStyle = { fontSize: 11, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.06em" };

    // ── Field is defined OUTSIDE App to prevent re-creation on every keystroke ──
    function Field({ label, fieldKey, type, options, form, setForm, currentRole }) {
      type = type || "text";
      const editable = canEditField(currentRole, fieldKey);
      if (!editable) return (
        <div style={fieldStyle}>
          <label style={labelStyle}>{label}</label>
          <div style={{ ...inputBase, background: "#f8fafc", color: "#94a3b8", cursor: "not-allowed", display: "flex", alignItems: "center", minHeight: 36 }}>{form[fieldKey] || "—"}</div>
        </div>
      );
      if (options) return (
        <div style={fieldStyle}>
          <label style={labelStyle}>{label}</label>
          <select style={inputBase} value={form[fieldKey]} onChange={e => setForm(p => ({ ...p, [fieldKey]: e.target.value }))}>
            <option value="">Select…</option>
            {options.map(o => <option key={o} value={o}>{o}</option>)}
          </select>
        </div>
      );
      if (type === "textarea") return (
        <div style={{ ...fieldStyle, gridColumn: "1/-1" }}>
          <label style={labelStyle}>{label}</label>
          <textarea rows={3} style={{ ...inputBase, resize: "vertical" }} value={form[fieldKey]} onChange={e => setForm(p => ({ ...p, [fieldKey]: e.target.value }))} />
        </div>
      );
      return (
        <div style={fieldStyle}>
          <label style={labelStyle}>{label}</label>
          <input type={type} style={inputBase} value={form[fieldKey]} onChange={e => setForm(p => ({ ...p, [fieldKey]: e.target.value }))} />
        </div>
      );
    }

    function App() {
      const [currentUser, setCurrentUser] = useState(USERS[0]);
      const [view, setView] = useState("dashboard");
      const [records, setRecords] = useState(() => loadRecordsFromStorage() || SAMPLE_DATA);
      const [editingRecord, setEditingRecord] = useState(null);
      const [detailRecord, setDetailRecord] = useState(null);
      const [form, setForm] = useState(EMPTY_FORM);
      const [filters, setFilters] = useState({ status: "", severity: "", category: "", type: "", impactType: "" });
      const [search, setSearch] = useState("");
      const [emailModal, setEmailModal] = useState(null);
      const [emailSending, setEmailSending] = useState(false);
      const [activeProject, setActiveProject] = useState(null);

      const perms = ROLE_PERMISSIONS[currentUser.role] || ROLE_PERMISSIONS["Viewer"];

      // ── Projects visible to current user: Admin sees all, others see only their owned projects ──
      const visibleProjects = PROJECTS.filter(p =>
        currentUser.role === "Admin" || p.owners.includes(currentUser.name)
      );

      // ── Save to localStorage whenever records change ──
      useEffect(() => { saveRecordsToStorage(records); }, [records]);

      const filteredRecords = records.filter(r => {
        if (filters.status && r.status !== filters.status) return false;
        if (filters.severity && r.severityLevel !== filters.severity) return false;
        if (filters.category && r.category !== filters.category) return false;
        if (filters.type && r.type !== filters.type) return false;
        if (filters.impactType && r.impactType !== filters.impactType) return false;
        if (search && !JSON.stringify(r).toLowerCase().includes(search.toLowerCase())) return false;
        if (!perms.canViewAll && r.reportedBy !== currentUser.name && r.responsibleIndividual !== currentUser.name) return false;
        return true;
      });

      function openCreate() {
        setEditingRecord(null);
        setForm({ ...EMPTY_FORM, reportedBy: currentUser.name, feedbackLoggedBy: currentUser.name });
        setView("form");
      }
      function openEdit(record) { setEditingRecord(record); setForm({ ...record }); setView("form"); }
      async function saveForm() {
        if (editingRecord) {
          setRecords(prev => prev.map(r => r.id === editingRecord.id ? { ...form, id: editingRecord.id } : r));
          activeProject ? setView("project") : setView("list");
        } else {
          const newId = `FE-${String(records.length + 1).padStart(3, "0")}`;
          const newRecord = { ...form, id: newId };
          setRecords(prev => [...prev, newRecord]);
          activeProject ? setView("project") : setView("list");
          // 🔔 Send email notifications to all users
          setEmailSending(true);
          try {
            const result = await sendEmailJSNotifications(newRecord, USERS);
            setEmailModal(result);
          } catch(e) {
            setEmailModal(null);
          } finally {
            setEmailSending(false);
          }
        }
      }
      function deleteRecord(id) {
        if (window.confirm("Delete this record?")) {
          setRecords(prev => prev.filter(r => r.id !== id));
          setView("list");
        }
      }

      return (
        <div style={{ minHeight: "100vh", background: "#f1f5f9", display: "flex" }}>
          {/* Email Notification Modal */}
          <EmailModal notification={emailModal} sending={emailSending} onClose={() => setEmailModal(null)} />
          {/* Sidebar */}
          <div style={{ width: 232, minHeight: "100vh", background: "#0f172a", display: "flex", flexDirection: "column", flexShrink: 0, position: "sticky", top: 0, height: "100vh", overflowY: "auto" }}>
            <div style={{ padding: "24px 20px 16px", borderBottom: "1px solid #1e293b" }}>
              <div style={{ fontSize: 16, fontWeight: 800, color: "#38bdf8" }}>ClientPulse</div>
              <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>Feedback & Escalations</div>
            </div>
            <div style={{ padding: "12px 16px", borderBottom: "1px solid #1e293b" }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: "#475569", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 6 }}>Active User</div>
              <select value={currentUser.id} onChange={e => setCurrentUser(USERS.find(u => u.id === parseInt(e.target.value)))}
                style={{ width: "100%", background: "#1e293b", color: "#94a3b8", border: "1px solid #334155", borderRadius: 6, padding: "6px 8px", fontSize: 12 }}>
                {USERS.map(u => <option key={u.id} value={u.id}>{u.name} ({u.role})</option>)}
              </select>
            </div>
            <nav style={{ flex: 1, padding: "8px 0" }}>
              {/* Main nav */}
              {[{ key: "dashboard", label: "Dashboard", icon: "▦" }, { key: "list", label: "All Records", icon: "≡", adminOnly: true }]
                .filter(item => !item.adminOnly || currentUser.role === "Admin")
                .map(item => (
                <button key={item.key} onClick={() => { setView(item.key); setActiveProject(null); }} style={{
                  width: "100%", display: "flex", alignItems: "center", gap: 10, padding: "10px 20px",
                  background: view === item.key && !activeProject ? "#1e40af" : "transparent",
                  color: view === item.key && !activeProject ? "#fff" : "#94a3b8",
                  border: "none", cursor: "pointer", fontSize: 13, textAlign: "left",
                }}>
                  <span>{item.icon}</span>{item.label}
                </button>
              ))}

              {/* Projects section */}
              {visibleProjects.length > 0 && (
                <div style={{ marginTop: 8 }}>
                  <div style={{ padding: "8px 20px 4px", fontSize: 10, fontWeight: 700, color: "#475569", textTransform: "uppercase", letterSpacing: "0.07em" }}>
                    Projects
                  </div>
                  {visibleProjects.map(proj => {
                    const isActive = activeProject === proj.id;
                    const projCount = records.filter(r => r.projectName === proj.name).length;
                    return (
                      <button key={proj.id} onClick={() => { setActiveProject(proj.id); setView("project"); }}
                        style={{
                          width: "100%", display: "flex", alignItems: "center", gap: 9, padding: "9px 20px",
                          background: isActive ? "#1e293b" : "transparent",
                          color: isActive ? "#fff" : "#94a3b8",
                          border: "none", cursor: "pointer", fontSize: 12, textAlign: "left",
                          borderLeft: isActive ? `3px solid ${proj.color}` : "3px solid transparent",
                        }}>
                        <span style={{ fontSize: 13, color: proj.color, fontWeight: 900, lineHeight: 1, flexShrink: 0 }}>{proj.icon}</span>
                        <span style={{ flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{proj.name}</span>
                        <span style={{ fontSize: 10, background: "#1e293b", color: "#64748b", borderRadius: 999, padding: "1px 6px", fontWeight: 700, flexShrink: 0 }}>{projCount}</span>
                      </button>
                    );
                  })}
                </div>
              )}

              {/* Access Control — Admin only */}
              {perms.canDelete && (
                <button onClick={() => { setView("access"); setActiveProject(null); }} style={{
                  width: "100%", display: "flex", alignItems: "center", gap: 10, padding: "10px 20px", marginTop: 8,
                  background: view === "access" ? "#1e40af" : "transparent",
                  color: view === "access" ? "#fff" : "#94a3b8",
                  border: "none", cursor: "pointer", fontSize: 13, textAlign: "left",
                }}>
                  <span>🔐</span>Access Control
                </button>
              )}
            </nav>
            <div style={{ padding: "12px 16px" }}>
              <div style={{ background: "#1e293b", borderRadius: 8, padding: "10px 12px", display: "flex", alignItems: "center", gap: 10 }}>
                <Avatar initials={currentUser.avatar} size={28} />
                <div>
                  <div style={{ fontSize: 12, fontWeight: 600, color: "#e2e8f0" }}>{currentUser.name}</div>
                  <div style={{ fontSize: 10, color: "#64748b" }}>{currentUser.role}</div>
                </div>
              </div>
            </div>
          </div>

          {/* Main */}
          <div style={{ flex: 1, padding: "28px 32px", overflowX: "auto", overflowY: "auto" }}>

            {/* Dashboard */}
            {view === "dashboard" && (
              <div>
                <h1 style={{ margin: "0 0 4px", fontSize: 24, fontWeight: 700, color: "#0f172a" }}>ClientPulse Dashboard</h1>
                <p style={{ margin: "0 0 24px", color: "#64748b", fontSize: 14 }}>Feedback & Escalation Overview</p>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 16, marginBottom: 28 }}>
                  {[
                    { label: "Total Records", value: records.length, color: "#6366f1" },
                    { label: "Open", value: records.filter(r => r.status === "Open").length, color: "#2563eb" },
                    { label: "In Progress", value: records.filter(r => r.status === "In Progress").length, color: "#7c3aed" },
                    { label: "Critical", value: records.filter(r => r.severityLevel === "Critical").length, color: "#dc2626" },
                  ].map(s => (
                    <div key={s.label} style={{ background: "#fff", borderRadius: 12, padding: "20px 24px", border: "1px solid #e2e8f0" }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.06em" }}>{s.label}</div>
                      <div style={{ fontSize: 36, fontWeight: 800, color: s.color, marginTop: 6 }}>{s.value}</div>
                    </div>
                  ))}
                </div>
                <div style={{ background: "#fff", borderRadius: 12, padding: "20px 24px", border: "1px solid #e2e8f0" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                    <h2 style={{ margin: 0, fontSize: 15, fontWeight: 700, color: "#1e293b" }}>Recent Records</h2>
                    <button onClick={() => setView("list")} style={{ background: "none", border: "none", color: "#6366f1", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>View All →</button>
                  </div>
                  <RecordTable records={records.slice(0, 5)} onView={r => { setDetailRecord(r); setView("detail"); }} onEdit={openEdit} onDelete={deleteRecord} perms={perms} />
                </div>
              </div>
            )}

            {/* List */}
            {view === "list" && (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
                  <div>
                    <h1 style={{ margin: 0, fontSize: 24, fontWeight: 700, color: "#0f172a" }}>All Records</h1>
                    <p style={{ margin: "4px 0 0", color: "#64748b", fontSize: 14 }}>{filteredRecords.length} entries</p>
                  </div>
                  {perms.canCreate && <button onClick={openCreate} style={primaryBtn}>+ New Record</button>}
                </div>
                <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
                  <input placeholder="Search…" value={search} onChange={e => setSearch(e.target.value)}
                    style={{ padding: "8px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0", fontSize: 13, width: 200, outline: "none" }} />
                  {[
                    { key: "status", label: "Status", options: ["Open","In Progress","Resolved","Closed"] },
                    { key: "severity", label: "Severity", options: ["Critical","High","Medium","Low"] },
                    { key: "category", label: "Category", options: ["Escalation","Feedback","Complaint","Suggestion"] },
                    { key: "type", label: "Type", options: ["Process","Product","People","Technology","Quality"] },
                    { key: "impactType", label: "Impact Type", options: ["Client","Internal","Both","Operational"] },
                  ].map(f => (
                    <select key={f.key} value={filters[f.key]} onChange={e => setFilters(p => ({ ...p, [f.key]: e.target.value }))}
                      style={{ padding: "8px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0", fontSize: 13, background: "#fff", cursor: "pointer" }}>
                      <option value="">All {f.label}s</option>
                      {f.options.map(o => <option key={o} value={o}>{o}</option>)}
                    </select>
                  ))}
                  {(filters.status || filters.severity || filters.category || filters.type || filters.impactType || search) && (
                    <button onClick={() => { setFilters({ status: "", severity: "", category: "", type: "", impactType: "" }); setSearch(""); }}
                      style={{ padding: "8px 14px", borderRadius: 8, border: "1.5px solid #e2e8f0", background: "#f1f5f9", color: "#475569", fontSize: 13, cursor: "pointer" }}>
                      Clear
                    </button>
                  )}
                </div>
                <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #e2e8f0" }}>
                  <RecordTable records={filteredRecords} onView={r => { setDetailRecord(r); setView("detail"); }} onEdit={openEdit} onDelete={deleteRecord} perms={perms} />
                </div>
              </div>
            )}

            {/* Detail */}
            {view === "detail" && detailRecord && (
              <div>
                <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 20 }}>
                  <button onClick={() => activeProject ? setView("project") : setView("list")} style={backBtn}>← Back</button>
                  <h1 style={{ margin: 0, fontSize: 20, fontWeight: 700, color: "#0f172a" }}>{detailRecord.id} — {detailRecord.projectName}</h1>
                </div>
                <DetailView record={detailRecord} onEdit={() => openEdit(detailRecord)} perms={perms} onDelete={() => deleteRecord(detailRecord.id)} />
              </div>
            )}

            {/* Form */}
            {view === "form" && (
              <div>
                <div style={{ display: "flex", gap: 12, alignItems: "center", marginBottom: 20 }}>
                  <button onClick={() => activeProject ? setView("project") : setView("list")} style={backBtn}>← Cancel</button>
                  <h1 style={{ margin: 0, fontSize: 20, fontWeight: 700, color: "#0f172a" }}>{editingRecord ? `Edit ${editingRecord.id}` : "New Record"}</h1>
                </div>
                {ROLE_PERMISSIONS[currentUser.role] && ROLE_PERMISSIONS[currentUser.role].editableFields !== "all" && (
                  <div style={{ background: "#fffbeb", border: "1px solid #fcd34d", borderRadius: 8, padding: "10px 16px", marginBottom: 16, fontSize: 13, color: "#92400e" }}>
                    ⚠ As <strong>{currentUser.role}</strong>, you can only edit: {ROLE_PERMISSIONS[currentUser.role].editableFields.join(", ")}
                  </div>
                )}
                <div style={{ background: "#fff", borderRadius: 12, padding: 24, border: "1px solid #e2e8f0" }}>
                  <Section title="Basic Information">
                    <Field label="Entry Date" fieldKey="entryDate" type="date" form={form} setForm={setForm} currentRole={currentUser.role} />
                    <Field label="Project Name" fieldKey="projectName" options={PROJECTS.map(p => p.name)} form={form} setForm={setForm} currentRole={currentUser.role} />
                    <Field label="Service Line" fieldKey="serviceLine" form={form} setForm={setForm} currentRole={currentUser.role} />
                    <Field label="BU Name" fieldKey="buName" form={form} setForm={setForm} currentRole={currentUser.role} />
                    <Field label="Client Name" fieldKey="clientName" form={form} setForm={setForm} currentRole={currentUser.role} />
                    <Field label="Date Received" fieldKey="dateReceived" type="date" form={form} setForm={setForm} currentRole={currentUser.role} />
                    <Field label="Reported By" fieldKey="reportedBy" form={form} setForm={setForm} currentRole={currentUser.role} />
                    <Field label="Communication Mode" fieldKey="communicationMode" options={["Email","Call","Meeting","Portal","Chat"]} form={form} setForm={setForm} currentRole={currentUser.role} />
                  </Section>
                  <Section title="Classification">
                    <Field label="Category" fieldKey="category" options={["Escalation","Feedback","Complaint","Suggestion"]} form={form} setForm={setForm} currentRole={currentUser.role} />
                    <Field label="Severity Level" fieldKey="severityLevel" options={["Critical","High","Medium","Low"]} form={form} setForm={setForm} currentRole={currentUser.role} />
                    <Field label="Type" fieldKey="type" options={["Process","Product","People","Technology","Quality"]} form={form} setForm={setForm} currentRole={currentUser.role} />
                    <Field label="Impact Type" fieldKey="impactType" options={["Client","Internal","Both","Operational"]} form={form} setForm={setForm} currentRole={currentUser.role} />
                  </Section>
                  <Section title="Issue Details">
                    <Field label="Detailed Description" fieldKey="detailedDescription" type="textarea" form={form} setForm={setForm} currentRole={currentUser.role} />
                    <Field label="Volume Impacted" fieldKey="volumeImpacted" form={form} setForm={setForm} currentRole={currentUser.role} />
                    <Field label="Repeated Issue" fieldKey="repeatedIssue" options={["Yes","No"]} form={form} setForm={setForm} currentRole={currentUser.role} />
                    <Field label="Feedback Logged By" fieldKey="feedbackLoggedBy" form={form} setForm={setForm} currentRole={currentUser.role} />
                  </Section>
                  <Section title="Ownership">
                    <Field label="Responsible Team" fieldKey="responsibleTeam" form={form} setForm={setForm} currentRole={currentUser.role} />
                    <Field label="Responsible Individual" fieldKey="responsibleIndividual" form={form} setForm={setForm} currentRole={currentUser.role} />
                    <Field label="QA Person Involved" fieldKey="qaInvolved" form={form} setForm={setForm} currentRole={currentUser.role} />
                  </Section>
                  <Section title="Closure Governance">
                    <Field label="Root Cause Category" fieldKey="rootCauseCategory" options={["Infrastructure","Process Gap","Human Error","Performance","Third Party","Unknown"]} form={form} setForm={setForm} currentRole={currentUser.role} />
                    <Field label="Corrective Action" fieldKey="correctiveAction" type="textarea" form={form} setForm={setForm} currentRole={currentUser.role} />
                    <Field label="Preventive Action" fieldKey="preventiveAction" type="textarea" form={form} setForm={setForm} currentRole={currentUser.role} />
                    <Field label="Responsible Owner" fieldKey="responsibleOwner" form={form} setForm={setForm} currentRole={currentUser.role} />
                    <Field label="Status" fieldKey="status" options={["Open","In Progress","Resolved","Closed"]} form={form} setForm={setForm} currentRole={currentUser.role} />
                    <Field label="TAT for Closure (days)" fieldKey="tatForClosure" type="number" form={form} setForm={setForm} currentRole={currentUser.role} />
                    <Field label="Actual TAT (days)" fieldKey="actualTat" type="number" form={form} setForm={setForm} currentRole={currentUser.role} />
                  </Section>
                  <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 8 }}>
                    <button onClick={() => activeProject ? setView("project") : setView("list")} style={secondaryBtn}>Cancel</button>
                    <button onClick={saveForm} style={primaryBtn}>{editingRecord ? "Save Changes" : "Create Record"}</button>
                  </div>
                </div>
              </div>
            )}

            {/* Project View */}
            {view === "project" && activeProject && (() => {
              const proj = PROJECTS.find(p => p.id === activeProject);
              if (!proj) return null;
              const projRecords = records.filter(r => r.projectName === proj.name);
              const projFiltered = projRecords.filter(r => {
                if (filters.status && r.status !== filters.status) return false;
                if (filters.severity && r.severityLevel !== filters.severity) return false;
                if (filters.category && r.category !== filters.category) return false;
                if (filters.type && r.type !== filters.type) return false;
                if (filters.impactType && r.impactType !== filters.impactType) return false;
                if (search && !JSON.stringify(r).toLowerCase().includes(search.toLowerCase())) return false;
                return true;
              });
              const isOwner = proj.owners.includes(currentUser.name) || currentUser.role === "Admin";
              return (
                <div>
                  {/* Project Header */}
                  <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 24 }}>
                    <div style={{ width: 48, height: 48, borderRadius: 12, background: proj.color + "18", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26, fontWeight: 900, color: proj.color, border: `2px solid ${proj.color}33` }}>
                      {proj.icon}
                    </div>
                    <div>
                      <h1 style={{ margin: 0, fontSize: 22, fontWeight: 800, color: "#0f172a" }}>{proj.name}</h1>
                      <div style={{ fontSize: 13, color: "#64748b", marginTop: 2 }}>
                        Project Owner{proj.owners.length > 1 ? "s" : ""}: <strong style={{ color: proj.color }}>{proj.owners.join(", ")}</strong>
                      </div>
                    </div>
                    <div style={{ flex: 1 }} />
                    {isOwner && perms.canCreate && (
                      <button onClick={() => { setEditingRecord(null); setForm({ ...EMPTY_FORM, projectName: proj.name, reportedBy: currentUser.name, feedbackLoggedBy: currentUser.name }); setView("form"); }}
                        style={{ ...primaryBtn, background: proj.color }}>+ New Record</button>
                    )}
                  </div>

                  {/* Project Stats */}
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 14, marginBottom: 24 }}>
                    {[
                      { label: "Total", value: projRecords.length, color: proj.color },
                      { label: "Open", value: projRecords.filter(r => r.status === "Open").length, color: "#2563eb" },
                      { label: "In Progress", value: projRecords.filter(r => r.status === "In Progress").length, color: "#7c3aed" },
                      { label: "Critical", value: projRecords.filter(r => r.severityLevel === "Critical").length, color: "#dc2626" },
                    ].map(s => (
                      <div key={s.label} style={{ background: "#fff", borderRadius: 10, padding: "16px 20px", border: "1px solid #e2e8f0" }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.06em" }}>{s.label}</div>
                        <div style={{ fontSize: 32, fontWeight: 800, color: s.color, marginTop: 4 }}>{s.value}</div>
                      </div>
                    ))}
                  </div>

                  {/* Access notice for non-owners */}
                  {!isOwner && (
                    <div style={{ background: "#fef9c3", border: "1px solid #fde047", borderRadius: 8, padding: "10px 16px", marginBottom: 16, fontSize: 13, color: "#854d0e" }}>
                      👁 You are viewing this project in read-only mode. Only project owners can create or edit records here.
                    </div>
                  )}

                  {/* Filters */}
                  <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
                    <input placeholder="Search…" value={search} onChange={e => setSearch(e.target.value)}
                      style={{ padding: "8px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0", fontSize: 13, width: 200, outline: "none" }} />
                    {[
                      { key: "status", label: "Status", options: ["Open","In Progress","Resolved","Closed"] },
                      { key: "severity", label: "Severity", options: ["Critical","High","Medium","Low"] },
                      { key: "category", label: "Category", options: ["Escalation","Feedback","Complaint","Suggestion"] },
                    ].map(f => (
                      <select key={f.key} value={filters[f.key]} onChange={e => setFilters(p => ({ ...p, [f.key]: e.target.value }))}
                        style={{ padding: "8px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0", fontSize: 13, background: "#fff", cursor: "pointer" }}>
                        <option value="">All {f.label}s</option>
                        {f.options.map(o => <option key={o} value={o}>{o}</option>)}
                      </select>
                    ))}
                    {(filters.status || filters.severity || filters.category || search) && (
                      <button onClick={() => { setFilters({ status: "", severity: "", category: "", type: "", impactType: "" }); setSearch(""); }}
                        style={{ padding: "8px 14px", borderRadius: 8, border: "1.5px solid #e2e8f0", background: "#f1f5f9", color: "#475569", fontSize: 13, cursor: "pointer" }}>
                        Clear
                      </button>
                    )}
                  </div>

                  {/* Records Table */}
                  <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #e2e8f0" }}>
                    <div style={{ padding: "14px 20px", borderBottom: "1px solid #f1f5f9", display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ fontSize: 14 }}>{proj.icon}</span>
                      <span style={{ fontWeight: 700, color: "#1e293b", fontSize: 14 }}>{proj.name}</span>
                      <span style={{ fontSize: 12, color: "#64748b", marginLeft: 4 }}>— {projFiltered.length} record{projFiltered.length !== 1 ? "s" : ""}</span>
                    </div>
                    <RecordTable
                      records={projFiltered}
                      onView={r => { setDetailRecord(r); setView("detail"); }}
                      onEdit={isOwner ? openEdit : null}
                      onDelete={isOwner && perms.canDelete ? deleteRecord : null}
                      perms={isOwner ? perms : { ...perms, canEdit: false, canDelete: false }}
                    />
                  </div>
                </div>
              );
            })()}

            {/* Access Control */}
            {view === "access" && (
              <AccessControl />
            )}
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
